<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form
      name="case-review"
      method="POST"
      action="/__forms.html"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="case-review" />
      <input type="text" name="bot-field" />
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="accidentDate" />
      <input type="text" name="yourInsurance" />
      <input type="text" name="otherInsurance" />
      <input type="text" name="liability" />
    </form>
  </body>
</html>
